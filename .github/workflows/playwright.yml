name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      browser:
        description: "Browser to run on (manual runs)"
        required: true
        default: "chromium"
        type: choice
        options:
          - chromium
          - firefox
          - webkit
      spec:
        description: "Spec to run (manual runs)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - tests/smoke/smoke.spec.js
          - tests/network/network.spec.js
          - tests/multi-user/multi-user.spec.js
          - tests/fusion/fusion.spec.js
          - tests/chaos.spec.js
          - tests/har.spec.js
          - tests/iframe/iframe.spec.js
          - tests/dom/shadowdom.spec.js
          - tests/xpath/xpath.spec.js
          - tests/complex/complex.spec.js
  schedule:
    - cron: '0 3 * * *'
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Build Test Command
        id: cmd
        shell: bash
        run: |
          set -euo pipefail
          TEST_CMD="npx playwright test"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TEST_CMD="$TEST_CMD --project=${{ github.event.inputs.browser }}"
            if [[ "${{ github.event.inputs.spec }}" != "all" ]]; then
              TEST_CMD="$TEST_CMD ${{ github.event.inputs.spec }}"
            fi
          fi
          echo "test_cmd=$TEST_CMD" >> "$GITHUB_OUTPUT"
      - name: Run Playwright tests
        run: ${{ steps.cmd.outputs.test_cmd }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
